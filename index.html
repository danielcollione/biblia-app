    .splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: #1a1a1a;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.3s ease-out;
    }

    .splash-logo {
      width: 150px;
      /* Ajuste o tamanho conforme achar melhor */
      height: auto;
      margin-bottom: 25px;
      animation: fadeInPulse 2.5s infinite ease-in-out;
    }

    .loading-bar {
      width: 100px;
      height: 1px;
      background: rgba(161, 142, 118, 0.2);
      position: relative;
      overflow: hidden;
    }

    .loading-bar::after {
      content: '';
      position: absolute;
      left: -100%;
      width: 100%;
      height: 100%;
      background: #a18e76;
      animation: slideProgress 1.5s infinite linear;
    }

    @keyframes fadeInPulse {
      0% {
        opacity: 0.6;
        transform: scale(0.98);
      }

      50% {
        opacity: 1;
        transform: scale(1);
      }

      100% {
        opacity: 0.6;
        transform: scale(0.98);
      }
    }

    @keyframes slideProgress {
      0% {
        left: -100%;
      }

      100% {
        left: 100%;
      }
    }

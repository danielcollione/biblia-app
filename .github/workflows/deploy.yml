name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        # Adicionei o comando explícito de prerender para garantir a geração das rotas estáticas
        run: npx ng build --configuration production --base-href /

      - name: Fix for GitHub Pages (404 workaround)
        # Como o GitHub Pages não lida bem com rotas SPA sem SSR,
        # copiamos o index.html para 404.html para evitar erros ao dar F5
        run: cp dist/biblia-interativa/browser/index.html dist/biblia-interativa/browser/404.html

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist/biblia-interativa/browser
          branch: gh-pages
          clean: true

<body ngcm="">
  <app-root>

    <style>
      .splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: #1a1a1a;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
      }

      .splash-logo {
        width: 150px;
        /* Ajuste o tamanho conforme achar melhor */
        height: auto;
        margin-bottom: 25px;
        animation: fadeInPulse 2.5s infinite ease-in-out;
      }

      .splash-text {
        font-family: 'Cinzel', serif;
        color: #a18e76;
        font-size: 1.4rem;
        letter-spacing: 4px;
        text-transform: uppercase;
        text-align: center;
      }

      .loading-bar {
        width: 100px;
        height: 1px;
        background: rgba(161, 142, 118, 0.2);
        margin-top: 30px;
        position: relative;
        overflow: hidden;
      }

      .loading-bar::after {
        content: '';
        position: absolute;
        left: -100%;
        width: 100%;
        height: 100%;
        background: #a18e76;
        animation: slideProgress 1.5s infinite linear;
      }

      @keyframes fadeInPulse {
        0% {
          opacity: 0.6;
          transform: scale(0.98);
        }

        50% {
          opacity: 1;
          transform: scale(1);
        }

        100% {
          opacity: 0.6;
          transform: scale(0.98);
        }
      }

      @keyframes slideProgress {
        0% {
          left: -100%;
        }

        100% {
          left: 100%;
        }
      }
    </style>

    <div class="splash-screen">
      <img src="logo-sem-fundo.png" alt="The Unveiled Bible" class="splash-logo">
      <div class="splash-text">The Unveiled Bible</div>
      <div class="loading-bar"></div>
    </div>
  </app-root>
